version: phone_accessories_v1
category: phone_accessories
factors:
  - key: product_prominence
    question: Is the phone accessory immediately identifiable as the main subject at feed-scroll speed?
    levels:
      - key: hero
        points: 8
        desc: The product is the single dominant focal point and fills enough of the frame to identify instantly.
      - key: present
        points: 1
        desc: The product is visible, but competes with other objects, hands, text, or background details.
      - key: lost
        points: -8
        desc: The product is hard to locate or understand within two seconds.
    evidence: "Inherited from v0. Product prominence is necessary for scoring but weak alone: v0 manual mining found hero-level prominence in 12/20 strong vs 15/20 weak."
  - key: use_case_context
    question: Does the image show a clear use case or ownership moment for the accessory?
    levels:
      - key: in_use
        points: 7
        desc: The accessory is shown on/with a phone in a realistic use moment, hand, desk, car, gym, or travel context.
      - key: contextual
        points: 2
        desc: The setting hints at lifestyle or use, but the functional relationship is not fully clear.
      - key: isolated
        points: -4
        desc: The product is isolated with no useful context or only a generic marketplace presentation.
    evidence: "Inherited from v0. Several marketplace images show handheld product photos, so this factor needs help from marketplace_listing_signal."
  - key: benefit_clarity
    question: Is one concrete buyer benefit visually or textually clear?
    levels:
      - key: specific
        points: 7
        desc: A specific benefit is clear, such as drop protection, MagSafe strength, slimness, fast charging, or organization.
      - key: generic
        points: 1
        desc: The image communicates a broad positive claim but not a concrete buyer reason.
      - key: absent
        points: -6
        desc: The image does not make a benefit legible.
    evidence: "Inherited from v0. This remains the strongest separator in manual mining, but v0 errors showed MagSafe cues can over-credit weak listing images."
  - key: visual_hierarchy
    question: Are product, text, and supporting elements arranged with a clean hierarchy?
    levels:
      - key: clean
        points: 6
        desc: The eye path is obvious, text is readable if present, and supporting elements do not distract.
      - key: busy
        points: 0
        desc: The layout is somewhat readable but has competing elements or weak spacing.
      - key: cluttered
        points: -7
        desc: The image is crowded, confusing, text-heavy, or visually noisy.
    evidence: "Inherited from v0. Clean hierarchy helps readability but can also reward plain marketplace listings."
  - key: material_and_detail
    question: Does the image make material quality, finish, or key construction details visible?
    levels:
      - key: tactile
        points: 5
        desc: Texture, finish, edges, ports, magnets, stitching, or construction details are clearly visible.
      - key: adequate
        points: 1
        desc: The product is clear enough, but material quality is not emphasized.
      - key: flat
        points: -4
        desc: The image looks flat, low-detail, over-compressed, or fails to show quality cues.
    evidence: "Inherited from v0. Keep as a low-confidence factor until richer data proves value."
  - key: brand_trust_signal
    question: Does the image provide a credible trust signal without overwhelming the creative?
    levels:
      - key: credible
        points: 4
        desc: Brand, review, warranty, compatibility, certification, or publication signal appears credible and relevant.
      - key: subtle
        points: 1
        desc: Some trust cue exists, but it is weak or not central.
      - key: none
        points: 0
        desc: No clear trust signal is visible.
    evidence: "Inherited from v0. Watch for logo bias: v0 false positives treated Apple logos as strong ad trust signals."
  - key: contrast_and_legibility
    question: Is the creative readable on a small mobile feed screen?
    levels:
      - key: high
        points: 5
        desc: Strong contrast, sharp subject boundaries, and legible text if text is present.
      - key: medium
        points: 0
        desc: Mostly readable but some text, edges, or subject boundaries are weak.
      - key: low
        points: -5
        desc: Low contrast, blurry, tiny text, or visual elements blend together.
    evidence: "Inherited from v0. Strong readability is useful but not enough to separate ads from clean listings."
  - key: marketplace_listing_signal
    question: Does the image show a real campaign/ad idea beyond product clarity, hand-held demonstration, or generic e-commerce presentation?
    levels:
      - key: campaign_like
        points: 4
        desc: "Choose only when there is clear campaign intent beyond a clean product shot: explicit ad copy or benefit claim, brand-owned campaign context, launch/editorial presentation, or a lifestyle story tied to the product benefit. Do not choose this only because the product is hand-held, has a MagSafe ring, shows an Apple/device logo, uses a clean background, or looks professionally photographed."
      - key: ambiguous
        points: 0
        desc: The image is polished and product-forward, but it lacks enough ad copy, narrative, brand campaign context, or marketplace cues to confidently call it campaign-like or generic listing-like.
      - key: generic_listing
        points: -10
        desc: "Choose when the image primarily reads as a marketplace listing, catalog shot, or sales-page asset, even if it is clean or hand-held: plain product display, generic hero image, templated e-commerce composition, compatibility/feature demo without campaign idea, or product-page lifestyle shot with little narrative."
    evidence: "Added after v0 error analysis. First v1 run improved overall metrics but still misclassified weak_case_012/013/016 as campaign_like because the original definition over-counted hand-held product shots, MagSafe/Apple cues, and clean product presentation as campaign intent."
